name: CI

on:
  push:
  pull_request:

jobs:
  windows-app:
    name: Windows app
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build
        run: dotnet build .\windows-app -c Release
      - name: Publish framework-dependent exe
        run: dotnet publish .\windows-app -c Release -r win-x64 --self-contained false -o .\artifacts\qr-grab
      - name: Self-test published exe
        run: .\artifacts\qr-grab\QRGrab.exe --self-test
      - uses: actions/upload-artifact@v4
        with:
          name: qr-grab-win-x64
          path: .\artifacts\qr-grab

  chrome-extension:
    name: Chrome extension
    runs-on: windows-latest
    defaults:
      run:
        working-directory: chrome-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: chrome-extension/package-lock.json
      - name: Install
        run: npm ci
      - name: Verify
        run: npm run verify
      - name: Package
        run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: qr-grab-extension
          path: chrome-extension\release\qr-grab-extension.zip
